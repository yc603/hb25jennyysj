<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>生日祝福升级版</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
}

/* ===== 页面切换动画 ===== */
.page{
position:absolute;
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
opacity:0;
transform:scale(1.1);
transition:all 0.8s ease;
pointer-events:none;
}

.active{
opacity:1;
transform:scale(1);
pointer-events:auto;
}

/* ===== 按钮 ===== */
button{
padding:12px 18px;
border:none;
border-radius:12px;
font-size:16px;
margin-top:15px;
}

/* ===== 第一幕 ===== */
.bg{
background:radial-gradient(circle,#222,#000);
}

/* ===== 3D蛋糕 ===== */
.cake{
position:relative;
transform-style:preserve-3d;
animation:float 3s infinite ease-in-out;
}

.layer{
width:160px;
height:40px;
background:pink;
margin:5px auto;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
transform:rotateX(20deg);
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* ===== 蜡烛 ===== */
.candle{
width:10px;height:40px;
background:yellow;
margin:10px auto;
position:relative;
}

.flame{
width:15px;height:15px;
background:orange;
border-radius:50%;
position:absolute;
top:-15px;
left:-3px;
animation:flame 0.3s infinite alternate;
}

@keyframes flame{
from{transform:scale(1);opacity:1}
to{transform:scale(1.3);opacity:0.6}
}

/* ===== 信封 ===== */
.envelope{
width:200px;
height:120px;
background:#fff;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
width:0;height:0;
border-left:100px solid transparent;
border-right:100px solid transparent;
border-bottom:60px solid #ddd;
top:0;
left:0;
transform-origin:top;
transition:1s;
}

.envelope.open{
transform:rotateX(20deg) scale(1.05);
}

.envelope.open:before{
transform:rotateX(180deg);
}

.letter{
background:white;
color:black;
padding:15px;
margin-top:10px;
display:none;
border-radius:10px;
}

/* ===== 瀑布照片 ===== */
.rain-photo{
position:absolute;
width:60px;
height:60px;
background:url('img1.jpg') center/cover;
border-radius:10px;
animation:fall linear infinite;
opacity:0.8;
filter:blur(0.5px);
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:0}
10%{opacity:1}
100%{transform:translateY(120vh);opacity:0}
}

</style>
</head>

<body>

<!-- 第一幕 -->
<div class="page active bg" id="p1">
<h1>欢迎，等你很久了~</h1>
<button onclick="go(2)">进入</button>
</div>

<!-- 第二幕 -->
<div class="page bg" id="p2">
<h2>答题挑战</h2>
<input id="ans"/>
<button onclick="check()">提交</button>
</div>

<!-- 第三幕 3D蛋糕 -->
<div class="page bg" id="p3">
<div class="cake">
<div class="layer"></div>
<div class="layer"></div>
<div class="layer"></div>

<div class="candle">
<div class="flame"></div>
</div>
</div>

<h2>🎂 生日快乐</h2>
<button onclick="go(4)">吹蜡烛</button>
</div>

<!-- 第四幕 信封 -->
<div class="page bg" id="p4">
<img src="img1.jpg" style="width:80%;border-radius:15px"/>

<div class="envelope" id="env" onclick="openEnv()"></div>

<div class="letter" id="letter"></div>
</div>

<!-- 第五幕 瀑布 -->
<div class="page bg" id="p5">
<h2>生日快乐 🎉</h2>
<button onclick="go(6)">继续</button>
</div>

<!-- 第六幕 视频 -->
<div class="page bg" id="p6">
<video controls style="width:90%">
<source src="video.mp4">
</video>
</div>

<script>

let page=1;
let q=0;

function go(n){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('p'+n).classList.add('active');
page=n;

if(n===5) startRain();
}

/* ===== 信封翻转 + 打字 ===== */
function openEnv(){
let env=document.getElementById('env');
let letter=document.getElementById('letter');

env.classList.add('open');
letter.style.display="block";

type(letter,"生日快乐，这是一封只给你的信 💌");
}

function type(el,text){
el.innerHTML="";
let i=0;
let t=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},60);
}

/* ===== 照片瀑布 ===== */
function startRain(){
for(let i=0;i<25;i++){
let d=document.createElement('div');
d.className="rain-photo";
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(3+Math.random()*3)+"s";
d.style.top="-100px";
document.body.appendChild(d);
}
}

</script>

</body>
</html>
